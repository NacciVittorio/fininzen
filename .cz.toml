# Commitizen — unified versioning for Fininzen.
# `just release` runs `cz bump`, which derives the next SemVer version from the
# Conventional Commits since the last tag, syncs every file in `version_files`,
# updates CHANGELOG.md and creates the `vX.Y.Z` tag. See wiki/VERSIONING.md.
[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
tag_format = "v$version"
update_changelog_on_bump = true
# Create annotated tags so `git push --follow-tags` actually pushes them
# (it ignores lightweight tags). Without this the Release workflow never fires.
annotated_tag = true
# Beta: stay in 0.x. While the major is 0, breaking changes bump the minor
# (0.x.0) instead of going to 1.0.0. Flip this to false for the first stable
# 1.0.0 release. See wiki/VERSIONING.md.
major_version_zero = true
# Single source of truth (VERSION) plus the web package manifest. The backend
# reads VERSION at runtime and Next.js inlines it at build time, so these two
# files are all that need rewriting on a bump.
version_files = [
    "VERSION",
    "web/package.json:\"version\"",
]
# openapi.json carries its own info.version (generated from VERSION by
# drf-spectacular), but it must be *regenerated*, not text-substituted like the
# version_files above — so it can't live in that list. This hook runs after
# VERSION is bumped and before the bump commit, folding the refreshed schema
# into it; a failure aborts the bump. Without it every release left the schema
# stale and tripped the CI "API contract in sync" gate.
pre_bump_hooks = [
    "just schema",
    "git add openapi.json",
]
