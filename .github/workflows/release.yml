name: Release

# Publish a GitHub Release whenever a version tag is pushed. The tag itself is
# created locally by `just release` (commitizen), which also writes the matching
# CHANGELOG.md section — this workflow just turns that tag into a Release whose
# notes are extracted from the CHANGELOG. See docs/VERSIONING.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for this tag
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Print the lines under the `## <version>` heading up to the next `## `.
          awk -v ver="$version" '
            /^## / { if (capture) exit; if (index($0, ver)) { capture=1; next } }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog entry found for $version; falling back to tag name." >&2
            echo "Release $GITHUB_REF_NAME" > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
